[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 50
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#fafafa"
secondaryBackgroundColor = "#ffffff"
textColor = "#111827"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true
